<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IoT Telemetry Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>IoT Telemetry Dashboard</h1>
      <p>Monitor simulated devices and platform metrics</p>
    </header>

    <section class="stats-section">
      <h2>Platform Stats</h2>
      <div id="stats" class="stats-grid">
        <div class="card">Loading stats...</div>
      </div>
    </section>

    <section class="devices-section">
      <h2>Devices</h2>
      <button id="refresh-btn">Refresh Devices</button>
      <div id="devices" class="devices-grid">
        <div class="card">Loading devices...</div>
      </div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
